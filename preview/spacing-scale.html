<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns: 90px 1fr 90px; gap: 18px; align-items:center; padding: 8px 0; border-bottom: 1px solid var(--hairline); }
  .row:last-child { border: none; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--gold); letter-spacing: 0.16em; }
  .bar { height: 20px; background: var(--violet); border-radius: 4px; box-shadow: 0 0 14px rgba(155,138,255,0.35); }
  .num { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align: right; }
</style></head>
<body>
  <div class="row"><div class="name">--sp-1</div><div class="bar" style="width:4px"></div><div class="num">4px</div></div>
  <div class="row"><div class="name">--sp-2</div><div class="bar" style="width:8px"></div><div class="num">8px</div></div>
  <div class="row"><div class="name">--sp-3</div><div class="bar" style="width:12px"></div><div class="num">12px</div></div>
  <div class="row"><div class="name">--sp-4</div><div class="bar" style="width:16px"></div><div class="num">16px</div></div>
  <div class="row"><div class="name">--sp-5</div><div class="bar" style="width:20px"></div><div class="num">20px</div></div>
  <div class="row"><div class="name">--sp-6</div><div class="bar" style="width:24px"></div><div class="num">24px</div></div>
  <div class="row"><div class="name">--sp-8</div><div class="bar" style="width:32px"></div><div class="num">32px</div></div>
  <div class="row"><div class="name">--sp-10</div><div class="bar" style="width:40px"></div><div class="num">40px</div></div>
  <div class="row"><div class="name">--sp-12</div><div class="bar" style="width:48px"></div><div class="num">48px</div></div>
  <div class="row"><div class="name">--sp-16</div><div class="bar" style="width:64px"></div><div class="num">64px</div></div>
  <div class="row"><div class="name">--sp-20</div><div class="bar" style="width:80px"></div><div class="num">80px</div></div>
</body></html>
