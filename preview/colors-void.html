<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; }
  .swatch { background: var(--surface); border:1px solid var(--hairline); border-radius: var(--r-sm); overflow:hidden; }
  .chip { height: 96px; }
  .meta { padding: 12px 14px; }
  .name { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.06em; color: var(--ink); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top:4px; }
  h2 { font-family: var(--font-display); font-weight:600; font-size: 13px; letter-spacing: 0.32em; color: var(--gold); text-transform: uppercase; margin: 4px 0 14px; }
  section + section { margin-top: 22px; }
</style></head>
<body>
  <section>
    <h2>Voids &amp; Surfaces</h2>
    <div class="row">
      <div class="swatch"><div class="chip" style="background:#0a0a14"></div><div class="meta"><div class="name">Void</div><div class="hex">#0a0a14</div></div></div>
      <div class="swatch"><div class="chip" style="background:#0f0e1c"></div><div class="meta"><div class="name">Void 2</div><div class="hex">#0f0e1c</div></div></div>
      <div class="swatch"><div class="chip" style="background:#15142a"></div><div class="meta"><div class="name">Surface</div><div class="hex">#15142a</div></div></div>
      <div class="swatch"><div class="chip" style="background:#1c1a35"></div><div class="meta"><div class="name">Surface 2</div><div class="hex">#1c1a35</div></div></div>
    </div>
  </section>
  <section>
    <h2>Surface · Hover</h2>
    <div class="row">
      <div class="swatch"><div class="chip" style="background:#252243"></div><div class="meta"><div class="name">Surface 3</div><div class="hex">#252243</div></div></div>
      <div class="swatch"><div class="chip" style="background:#2d2950"></div><div class="meta"><div class="name">Surface hover</div><div class="hex">#2d2950</div></div></div>
      <div class="swatch"><div class="chip" style="background:rgba(155,138,255,0.14)"></div><div class="meta"><div class="name">Hairline</div><div class="hex">rgba(155,138,255,.14)</div></div></div>
      <div class="swatch"><div class="chip" style="background:rgba(155,138,255,0.28)"></div><div class="meta"><div class="name">Hairline strong</div><div class="hex">rgba(155,138,255,.28)</div></div></div>
    </div>
  </section>
</body></html>
