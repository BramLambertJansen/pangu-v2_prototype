<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .tile { aspect-ratio: 4/3; position: relative; overflow: hidden; border-radius: 12px; border: 1px solid var(--hairline); }
  .placeholder-img { position: absolute; inset: 0; background: linear-gradient(135deg, #1c1a35 0%, #252243 100%); }
  .placeholder-img::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 30%, var(--accent, rgba(155,138,255,0.20)) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(245,200,66,0.08) 0%, transparent 50%); }
  .ph-glyph { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; font-family: var(--font-display); font-size: 88px; color: var(--accent, rgba(155,138,255,0.30)); }
  .ring { position: absolute; left: 70%; top: 60%; transform: translate(-50%, -50%); width: 28%; aspect-ratio: 1; border: 1px solid rgba(245,200,66,0.18); border-radius: 50%; }
  .ring2 { left: 70%; top: 60%; width: 44%; border: 1px solid rgba(155,138,255,0.14); }
  .tile-label { position: absolute; bottom: 12px; left: 14px; font-size: 10px; letter-spacing: 0.30em; text-transform: uppercase; color: rgba(232,228,240,0.6); }
  .stars { position: absolute; inset: 0; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin: 22px 0 12px; }
</style></head>
<body>
  <div class="lab">Cosmic placeholder · violet glyph → world art</div>
  <div class="row">
    <div class="tile" style="--accent: rgba(155,138,255,0.30)">
      <div class="placeholder-img"></div>
      <div class="ring ring2"></div><div class="ring"></div>
      <div class="ph-glyph">F</div>
      <svg class="stars" viewBox="0 0 200 150"><g fill="#e8e4f0"><circle cx="30" cy="20" r=".6" opacity=".7"/><circle cx="160" cy="34" r=".4" opacity=".5"/><circle cx="120" cy="100" r=".5" opacity=".5"/><circle cx="50" cy="120" r=".4" opacity=".4"/></g></svg>
      <div class="tile-label">Faerûn</div>
    </div>
    <div class="tile" style="--accent: rgba(255,107,107,0.30)">
      <div class="placeholder-img"></div>
      <div class="ring ring2" style="border-color: rgba(255,107,107,.18)"></div><div class="ring"></div>
      <div class="ph-glyph">R</div>
      <svg class="stars" viewBox="0 0 200 150"><g fill="#e8e4f0"><circle cx="30" cy="40" r=".6" opacity=".7"/><circle cx="170" cy="20" r=".4" opacity=".5"/><circle cx="80" cy="110" r=".5" opacity=".5"/></g></svg>
      <div class="tile-label">Ravenloft</div>
    </div>
    <div class="tile" style="--accent: rgba(62,207,178,0.30)">
      <div class="placeholder-img"></div>
      <div class="ring ring2" style="border-color: rgba(62,207,178,.18)"></div><div class="ring"></div>
      <div class="ph-glyph">S</div>
      <svg class="stars" viewBox="0 0 200 150"><g fill="#e8e4f0"><circle cx="44" cy="34" r=".6" opacity=".7"/><circle cx="120" cy="50" r=".4" opacity=".5"/><circle cx="60" cy="100" r=".5" opacity=".5"/><circle cx="170" cy="90" r=".4" opacity=".4"/></g></svg>
      <div class="tile-label">The Spire</div>
    </div>
  </div>
</body></html>
