<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
  .swatch { background: var(--surface); border:1px solid var(--hairline); border-radius: var(--r-sm); overflow:hidden; }
  .chip { height: 100px; }
  .meta { padding: 12px 14px; }
  .name { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.06em; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top:4px; }
  .role { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top:2px; }
  h2 { font-family: var(--font-display); font-weight:600; font-size: 13px; letter-spacing: 0.32em; color: var(--gold); text-transform: uppercase; margin: 4px 0 14px; }
</style></head>
<body>
  <h2>Status semantics</h2>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#3ecfb2"></div><div class="meta"><div class="name" style="color:#3ecfb2">Teal</div><div class="hex">#3ecfb2</div><div class="role">Alive · active · live session</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ff6b6b"></div><div class="meta"><div class="name" style="color:#ff6b6b">Crimson</div><div class="hex">#ff6b6b</div><div class="role">Danger · enemy · critical HP</div></div></div>
    <div class="swatch"><div class="chip" style="background:#6ba7ff"></div><div class="meta"><div class="name" style="color:#6ba7ff">Azure</div><div class="hex">#6ba7ff</div><div class="role">Informational</div></div></div>
  </div>
</body></html>
