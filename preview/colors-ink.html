<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
  .ink { padding: 22px 18px; background: var(--surface); border:1px solid var(--hairline); border-radius: var(--r-sm); }
  .ink .demo { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.04em; }
  .ink .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-top: 10px; }
  .ink .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="ink"><div class="demo" style="color:#f0ecf7">Ink</div><div class="name">High-emphasis</div><div class="hex">#f0ecf7</div></div>
    <div class="ink"><div class="demo" style="color:#c8c2dc">Ink soft</div><div class="name">Body</div><div class="hex">#c8c2dc</div></div>
    <div class="ink"><div class="demo" style="color:#8079a0">Muted</div><div class="name">Labels</div><div class="hex">#8079a0</div></div>
    <div class="ink"><div class="demo" style="color:#4a4565">Subtle</div><div class="name">Disabled · future</div><div class="hex">#4a4565</div></div>
  </div>
</body></html>
