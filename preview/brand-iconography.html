<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns: repeat(10, 1fr); gap: 12px; }
  .cell { aspect-ratio: 1; background: var(--surface); border: 1px solid var(--hairline); border-radius: 8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 6px; padding: 8px; color: var(--ink-soft); }
  .cell:hover { background: var(--surface-2); color: #9b8aff; border-color: rgba(155,138,255,.28); }
  .cell svg { width: 22px; height: 22px; }
  .cell .n { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
  .glyph-row { display:flex; gap: 20px; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--hairline); align-items: center; flex-wrap: wrap; }
  .glyph { font-family: var(--font-display); font-size: 28px; color: rgba(155,138,255,0.7); width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; border: 1px solid var(--hairline); border-radius: 50%; background: var(--surface); }
  .lab { font-size: 10px; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
</style></head>
<body>
  <div class="grid">

    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16l13-8z" fill="currentColor"/></svg><div class="n">play</div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg><div class="n">search</div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg><div class="n">plus</div></div>

    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1.5v3M12 19.5v3M4.5 4.5l2 2M17.5 17.5l2 2M1.5 12h3M19.5 12h3M4.5 19.5l2-2M17.5 6.5l2-2"/></svg><div class="n">cog</div></div>

</body></html>
