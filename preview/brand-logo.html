<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--void); color:var(--ink); font-family:var(--font-body); }
  .stage { position: relative; padding: 32px; overflow: hidden; min-height: 320px; }
  .stage::before { content:''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(155, 138, 255, 0.10), transparent 60%), radial-gradient(ellipse 60% 80% at 100% 100%, rgba(245, 200, 66, 0.05), transparent 60%), var(--void); }
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .content { position: relative; display: flex; align-items: center; gap: 40px; }

  .mark { width: 80px; height: 80px; border-radius: 16px; background: radial-gradient(circle at 30% 30%, var(--surface-3), var(--surface)); border: 1px solid var(--hairline-strong); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 28px rgba(155,138,255,0.25), inset 0 1px 0 rgba(255,255,255,0.05); }
  .mark svg { width: 56px; height: 56px; }
  .word .title { font-family: var(--font-display); font-size: 56px; font-weight: 600; letter-spacing: 0.10em; color: var(--ink); text-transform: uppercase; line-height: 1; }
  .word .sub { font-size: 11px; letter-spacing: 0.40em; color: var(--gold); font-weight: 700; margin-top: 8px; }
</style></head>
<body>
  <div class="stage">
    <svg class="stars" viewBox="0 0 800 320" preserveAspectRatio="none">
      <g fill="#e8e4f0">
        <circle cx="80" cy="50" r="0.6" opacity=".6"/>
        <circle cx="200" cy="90" r="0.4" opacity=".5"/>
        <circle cx="380" cy="40" r="0.8" opacity=".7"/>
        <circle cx="540" cy="60" r="0.5" opacity=".5"/>
        <circle cx="690" cy="100" r="0.6" opacity=".5"/>
        <circle cx="120" cy="220" r="0.5" opacity=".4"/>
        <circle cx="430" cy="260" r="0.7" opacity=".5"/>
        <circle cx="640" cy="240" r="0.5" opacity=".4"/>
        <circle cx="760" cy="180" r="0.4" opacity=".3"/>
      </g>
      <g stroke="#f5c842" stroke-width=".4" opacity=".7">
        <line x1="298" y1="180" x2="304" y2="180"/><line x1="301" y1="177" x2="301" y2="183"/>
        <line x1="596" y1="200" x2="602" y2="200"/><line x1="599" y1="197" x2="599" y2="203"/>
      </g>
    </svg>
    <div class="content">
      <div class="mark">
        <svg viewBox="0 0 32 32" aria-label="Pangu">
          <circle cx="16" cy="16" r="14" fill="none" stroke="#f5c842" stroke-width=".5" opacity=".5"/>
          <circle cx="16" cy="16" r="9" fill="none" stroke="#9b8aff" stroke-width=".8"/>
          <circle cx="16" cy="16" r="3" fill="#9b8aff"/>
          <circle cx="28" cy="16" r="1.6" fill="#f5c842"/>
          <circle cx="16" cy="4" r="1.2" fill="#f0ecf7" opacity=".8"/>
        </svg>
      </div>
      <div class="word">
        <div class="title">Pangu</div>
        <div class="sub">SANCTUM · II</div>
      </div>
    </div>
  </div>
</body></html>
